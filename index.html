<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <div class="heading">
            <h1>Task Manager</h1>
            <p>Organize your daily goals</p>
        </div>
    </header>
    
        <div class="main-content">
            <!-- Left side content -->
            <div class="leftside-main-content">
                 <div class="input-group">
        <input type="text" id="task-title" placeholder="Task Title" required>
        <input type="text" id="task-desc" placeholder="Description (Optional)">
        <input type="datetime-local" id="task-date" required>
        <button id="add-btn" onclick="addTask()">Add Task</button>
        <button id="update-btn" style="display: none;" onclick="updateTask()">Update Task</button>
           </div>
             <div class="filters">
        <button class="filter-btn active" onclick="filterTasks('all')">All</button>
        <button class="filter-btn" onclick="filterTasks('pending')">Pending</button>
        <button class="filter-btn" onclick="filterTasks('completed')">Completed</button>
    </div>
            </div>
            <!-- Left content end Here -->
             <!-- Right side content start here  -->
            <div class="rightside-main-content">
                  <ul id="task-list">
        </ul>
            </div>
            
            <!-- Right side content end here -->
        </div>
        <script src="index.js"></script>
</body>
</html>
